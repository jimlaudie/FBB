name: Fantasy Newsletter

on:
  schedule:
    - cron: "50 5 * * 1"   # 11:50 PM Sunday Mountain (Mon 05:50 UTC)
    - cron: "30 18 28 3 *" # 6:30 PM UTC on Mar 28, 2026 (one‑time draft night)
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test date (YYYY-MM-DD), e.g. 2026-04-06'
        required: false

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newsletter script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python newsletter.py
